<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Intern Race — Docker Challenge</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #0f172a;
      font-family: 'Segoe UI', system-ui, sans-serif;
      overflow: hidden;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background:
        radial-gradient(ellipse at 15% 60%, rgba(99,102,241,.18) 0%, transparent 55%),
        radial-gradient(ellipse at 85% 20%, rgba(6,182,212,.13) 0%, transparent 50%);
      pointer-events: none;
    }

    /* floating particles */
    .particles { position: fixed; inset: 0; pointer-events: none; overflow: hidden; }
    .particle {
      position: absolute;
      width: 4px; height: 4px;
      border-radius: 50%;
      background: rgba(99,102,241,.5);
      animation: drift linear infinite;
    }
    .particle:nth-child(2) { background: rgba(6,182,212,.4); width: 3px; height: 3px; }
    .particle:nth-child(3) { background: rgba(251,191,36,.3); }
    @keyframes drift {
      0%   { transform: translateY(100vh) rotate(0deg); opacity: 0; }
      10%  { opacity: 1; }
      90%  { opacity: 1; }
      100% { transform: translateY(-100px) rotate(360deg); opacity: 0; }
    }

    .card {
      position: relative;
      background: rgba(30,41,59,.95);
      border-radius: 24px;
      border: 1px solid rgba(99,102,241,.3);
      box-shadow: 0 25px 80px rgba(0,0,0,.5), 0 0 0 1px rgba(255,255,255,.03) inset;
      padding: 48px 44px;
      max-width: 480px;
      width: 92%;
      text-align: center;
    }

    .whale {
      font-size: 5rem;
      display: block;
      margin-bottom: 12px;
      animation: float 3.5s ease-in-out infinite;
    }
    @keyframes float {
      0%,100% { transform: translateY(0); }
      50%      { transform: translateY(-14px); }
    }

    h1 {
      font-size: 2.1rem;
      font-weight: 900;
      color: #f1f5f9;
      letter-spacing: -.02em;
      margin-bottom: 6px;
    }
    h1 em {
      font-style: normal;
      background: linear-gradient(135deg, #818cf8, #22d3ee);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .tagline {
      color: #94a3b8;
      font-size: .92rem;
      line-height: 1.6;
      margin-bottom: 32px;
    }

    .chips {
      display: flex;
      justify-content: center;
      gap: 12px;
      margin-bottom: 32px;
    }
    .chip {
      background: rgba(15,23,42,.7);
      border: 1px solid rgba(148,163,184,.12);
      border-radius: 14px;
      padding: 12px 18px;
      flex: 1;
    }
    .chip-icon { font-size: 1.5rem; display: block; margin-bottom: 4px; }
    .chip-val  { color: #f1f5f9; font-weight: 700; font-size: 1.05rem; display: block; }
    .chip-lbl  { color: #64748b; font-size: .68rem; letter-spacing: .04em; text-transform: uppercase; }

    .field-label {
      display: block;
      color: #94a3b8;
      font-size: .83rem;
      font-weight: 600;
      text-align: left;
      margin-bottom: 8px;
      letter-spacing: .03em;
      text-transform: uppercase;
    }

    input[type="text"] {
      width: 100%;
      padding: 14px 18px;
      background: rgba(15,23,42,.8);
      border: 2px solid rgba(99,102,241,.25);
      border-radius: 12px;
      color: #f1f5f9;
      font-size: 1rem;
      font-family: inherit;
      outline: none;
      transition: border-color .2s, box-shadow .2s;
      margin-bottom: 20px;
    }
    input[type="text"]:focus {
      border-color: #6366f1;
      box-shadow: 0 0 0 3px rgba(99,102,241,.15);
    }
    input[type="text"]::placeholder { color: #475569; }

    .btn-start {
      width: 100%;
      padding: 17px;
      background: linear-gradient(135deg, #6366f1 0%, #22d3ee 100%);
      border: none;
      border-radius: 14px;
      color: #fff;
      font-size: 1.08rem;
      font-weight: 800;
      font-family: inherit;
      cursor: pointer;
      letter-spacing: .02em;
      transition: opacity .15s, transform .1s, box-shadow .15s;
      box-shadow: 0 4px 24px rgba(99,102,241,.4);
    }
    .btn-start:hover { opacity: .92; transform: translateY(-2px); box-shadow: 0 8px 32px rgba(99,102,241,.5); }
    .btn-start:active { transform: translateY(0); }

    .lb {
      margin-top: 28px;
      border-top: 1px solid rgba(148,163,184,.1);
      padding-top: 20px;
    }
    .lb-title {
      font-size: .72rem;
      font-weight: 700;
      color: #64748b;
      text-transform: uppercase;
      letter-spacing: .06em;
      margin-bottom: 12px;
    }
    .lb-row {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 14px;
      border-radius: 10px;
      background: rgba(15,23,42,.6);
      border: 1px solid rgba(148,163,184,.07);
      margin-bottom: 6px;
    }
    .lb-medal { font-size: 1.2rem; width: 24px; flex-shrink: 0; }
    .lb-name  { flex: 1; font-size: .9rem; font-weight: 600; color: #f1f5f9; text-align: left; }
    .lb-pts   { font-size: .9rem; font-weight: 800; color: #22d3ee; }
    .lb-empty { color: #475569; font-size: .85rem; padding: 8px 0; }
  </style>
</head>
<body>

  <div class="particles">
    <div class="particle" style="left:15%;animation-duration:12s;animation-delay:0s;"></div>
    <div class="particle" style="left:45%;animation-duration:9s;animation-delay:3s;"></div>
    <div class="particle" style="left:75%;animation-duration:14s;animation-delay:6s;"></div>
  </div>

  <div class="card">
    <span class="whale">🐳</span>
    <h1>Intern <em>Race</em></h1>
    <p class="tagline">Answer Docker questions to advance on the track.<br>Reach the finish line before running out of lives.</p>

    <div class="chips">
      <div class="chip">
        <span class="chip-icon">❓</span>
        <span class="chip-val">10</span>
        <span class="chip-lbl">Questions</span>
      </div>
      <div class="chip">
        <span class="chip-icon">❤️</span>
        <span class="chip-val">3</span>
        <span class="chip-lbl">Lives</span>
      </div>
      <div class="chip">
        <span class="chip-icon">⏱️</span>
        <span class="chip-val">15s</span>
        <span class="chip-lbl">Per question</span>
      </div>
    </div>

    <label class="field-label" for="name">Your name</label>
    <input id="name" type="text" placeholder="e.g. Maria Garcia" maxlength="24" />

    <button class="btn-start" onclick="start()">Start the race 🚀</button>

    <div class="lb">
      <p class="lb-title">🏆 Top Scores</p>
      <div id="lb-list"><p class="lb-empty">Loading...</p></div>
    </div>
  </div>

  <script>
    document.getElementById('name').addEventListener('keydown', e => {
      if (e.key === 'Enter') start();
    });

    function start() {
      const name = document.getElementById('name').value.trim() || 'Intern';
      localStorage.setItem('racePlayer', name);
      window.location.href = 'game.html';
    }

    const MEDALS = ['🥇', '🥈', '🥉'];

    async function loadLeaderboard() {
      const list = document.getElementById('lb-list');
      try {
        const rows = await fetch('/api/scores').then(r => r.json());
        if (!rows.length) {
          list.innerHTML = '<p class="lb-empty">No scores yet — be the first!</p>';
          return;
        }
        list.innerHTML = rows.map((r, i) => `
          <div class="lb-row">
            <span class="lb-medal">${MEDALS[i]}</span>
            <span class="lb-name">${r.player}</span>
            <span class="lb-pts">${r.score} pts</span>
          </div>`).join('');
      } catch {
        list.innerHTML = '<p class="lb-empty">No scores yet — be the first!</p>';
      }
    }

    loadLeaderboard();
  </script>
</body>
</html>
